<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0d1e3a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Top accent bar -->
  <rect x="8" y="8" width="48" height="4" rx="2" fill="url(#accent)"/>
  <!-- "L" letter -->
  <text x="7" y="50" font-family="'Segoe UI',Arial,sans-serif" font-weight="900"
        font-size="30" fill="url(#accent)" letter-spacing="-1">L</text>
  <!-- "aaS" letters smaller -->
  <text x="27" y="50" font-family="'Segoe UI',Arial,sans-serif" font-weight="700"
        font-size="18" fill="#94a3b8">aaS</text>
  <!-- Bottom decorative dots -->
  <circle cx="10" cy="57" r="2" fill="#3b82f6" opacity="0.7"/>
  <circle cx="17" cy="57" r="2" fill="#06b6d4" opacity="0.5"/>
  <circle cx="24" cy="57" r="2" fill="#3b82f6" opacity="0.3"/>
</svg>
